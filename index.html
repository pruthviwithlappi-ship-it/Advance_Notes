<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1><i class="fas fa-book-open"></i> Notes</h1>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search notes...">
        </div>
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="theme-toggle">
                <input type="checkbox" id="theme-toggle" />
                <div class="slider round">
                    <i class="fas fa-sun sun-icon"></i>
                    <i class="fas fa-moon moon-icon"></i>
                </div>
            </label>
        </div>
    </header>

    <main id="notes-container">
        <!-- Notes will be added here -->
    </main>

    <button id="add-note-btn" class="floating-btn">
        <i class="fas fa-plus"></i> Add Note
    </button>

    <!-- Modal for adding a note -->
    <div id="note-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Note</h2>
                <button id="close-modal" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" id="note-title" placeholder="Title" autocomplete="off">
            <textarea id="note-text" placeholder="Type your note here..."></textarea>
            <div class="modal-footer">
                <button id="save-note" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
